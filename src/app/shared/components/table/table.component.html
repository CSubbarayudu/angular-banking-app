<table border="1" width="100%" style="border-collapse: collapse;">
  <thead>
    <tr>
      @for (header of headers; track $index) {
        <th style="padding: 8px;">
          {{ header }}
        </th>
      }
    </tr>
  </thead>

  <tbody>
    @for (row of data; track $index) {
      <tr>
        @for (col of columns; track col) {
          <td style="padding: 8px;">
            {{ row[col] }}
          </td>
        }
      </tr>
    }
  </tbody>
</table>
