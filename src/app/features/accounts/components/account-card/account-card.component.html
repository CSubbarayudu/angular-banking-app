<div class="account-card" (click)="onSelect()">
  <div class="card-top">
    <span class="account-icon">{{ getAccountIcon(account.accountType) }}</span>
    <span class="account-type">{{ account.accountType }}</span>
  </div>
  <div class="masked-number">{{ getMaskedNumber(account.accountNumber) }}</div>
  <div class="account-balance">₹{{ account.balance | number }}</div>
  <div class="card-footer">
    <span class="status-badge" [ngClass]="getStatusClass(account.status)">
      {{ account.status }}
    </span>
    <button class="btn-details">View Details →</button>
  </div>
</div>
