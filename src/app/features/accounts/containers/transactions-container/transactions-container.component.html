<div class="transactions-page">
    <h1>Transaction History</h1>

    @if (loading) {
      <app-loader></app-loader>
    }

    @if (error) {
      <app-error-message [message]="error"></app-error-message>
    }

    @if (!loading && !error) {
      <app-table [headers]="headers" [data]="transactions" [columns]="columns"></app-table>
    }
</div>
