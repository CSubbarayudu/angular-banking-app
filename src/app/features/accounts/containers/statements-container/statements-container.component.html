            <div class="statements-page">
  <h2>Account Statement</h2>

  <section class="account-card" *ngIf="accountLoading || accountError || account">
    <ng-container *ngIf="accountLoading">Loading account data...</ng-container>
    <ng-container *ngIf="accountError" class="error">{{ accountError }}</ng-container>

    <ng-container *ngIf="!accountLoading && account && !accountError">
      <div><strong>ID:</strong> {{account.id}}</div>
      <div><strong>Name:</strong> {{account.name || 'N/A'}}</div>
      <div><strong>Type:</strong> {{account.type || 'N/A'}}</div>
      <div><strong>Balance:</strong> {{account.balance | currency}}</div>
    </ng-container>
  </section>

  <section class="actions">
    <button class="primary" (click)="downloadCsv()" [disabled]="transactionsLoading || !transactions.length">Download Full Statement CSV</button>
    <button (click)="goBack()">Back to Account Details</button>
  </section>

  <section class="transactions-table">
    <ng-container *ngIf="transactionsLoading">Loading transactions...</ng-container>
    <ng-container *ngIf="transactionsError" class="error">{{ transactionsError }}</ng-container>
    <ng-container *ngIf="!transactionsLoading && !transactionsError && !transactions.length">
      No transactions found for this account.
    </ng-container>

    <app-table
      *ngIf="!transactionsLoading && !transactionsError && transactions.length"
      [headers]="['Date','Description','Amount','Type','Status']"
      [columns]="['date','description','amount','type','status']"
      [data]="transactions"
    >
    </app-table>
  </section>
</div>
