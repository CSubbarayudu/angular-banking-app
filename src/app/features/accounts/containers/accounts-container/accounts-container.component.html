<div class="page-padding">
  <h2 class="section-title" style="font-size: 22px; margin-bottom: 20px;">Accounts Overview</h2>

  <ng-container *ngIf="loading">
    <app-loader *ngIf="loading"></app-loader>
  </ng-container>

  <ng-container *ngIf="error">
    <app-error-message *ngIf="error" [message]="error"></app-error-message>
  </ng-container>

  <ng-container *ngIf="!loading && accounts.length > 0">
    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Account No</th>
            <th>Type</th>
            <th>Balance</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let acc of accounts">
            <td>{{ acc.accountNumber }}</td>
            <td>{{ acc.accountType }}</td>
            <td>₹{{ acc.balance }}</td>
            <td>
              <span class="badge"
                    [ngClass]="{
                      'badge-active': acc.status === 'Active',
                      'badge-inactive': acc.status === 'Inactive',
                      'badge-blocked': acc.status === 'Blocked'
                    }">
                {{ acc.status }}
              </span>
            </td>
            <td>
              <button class="btn-view" (click)="goToDetails(acc.id)">View</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </ng-container>

  <ng-container *ngIf="!loading && accounts.length === 0 && !error">
    <p>No accounts found.</p>
  </ng-container>
</div>
