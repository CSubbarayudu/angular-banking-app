<div class="accounts-page">

  <!-- Page Header -->
  <div class="page-header">
    <div>
      <h2 class="page-title">My Accounts</h2>
      <p class="page-subtitle">Manage and view your personal bank accounts</p>
    </div>
    <button class="btn-outline" (click)="router.navigate(['/dashboard'])">
      ← Back to Dashboard
    </button>
  </div>

  <!-- Loading State -->
  @if (isLoading) {
    <app-loader></app-loader>
  }

  <!-- Error State -->
  @if (errorMsg && !isLoading) {
    <app-error-message [message]="errorMsg"></app-error-message>
  }

  <!-- Accounts List -->
  @if (!isLoading && !errorMsg) {
    <div class="accounts-list">

      <!-- Empty State -->
      @if (accounts.length === 0) {
        <div class="empty-state">
          <p>No accounts found for your profile.</p>
        </div>
      }

      <!-- Account Cards -->
      @for (account of accounts; track account.id) {
        <app-account-card 
          [account]="account"
          (cardClicked)="goToDetails($event)">
        </app-account-card>
      }

    </div>
  }
</div>
